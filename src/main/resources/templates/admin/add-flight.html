<!DOCTYPE html>
<html>
<head>
<title>Add Flight</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1529070538774-1843cb3265df");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:600px;
margin:80px auto;
background:white;
padding:30px;
border-radius:6px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:12px;
background:#28a745;
border:none;
color:white;
border-radius:4px;
}

</style>
</head>

<body>

<div class="header">
<h1>Add Flight</h1>
</div>

<div class="container">

<form>

<label>Flight Number</label>
<input type="text">

<label>Airline</label>
<input type="text">

<label>Departure City</label>
<input type="text">

<label>Destination City</label>
<input type="text">

<label>Departure Time</label>
<input type="time">

<label>Arrival Time</label>
<input type="time">

<label>Price</label>
<input type="number">

<button>Add Flight</button>

</form>

</div>

</body>
</html>
