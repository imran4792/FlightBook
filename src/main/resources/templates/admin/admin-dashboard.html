<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.nav{
background:#004080;
padding:10px;
text-align:center;
}

.nav a{
color:white;
text-decoration:none;
margin:0 15px;
}

.container{
width:900px;
margin:50px auto;
background:white;
padding:30px;
border-radius:6px;
}

.card{
border:1px solid #ccc;
padding:20px;
margin-bottom:20px;
border-radius:5px;
}

button{
padding:10px 15px;
background:#0066cc;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h1>Admin Dashboard</h1>
</div>

<div class="nav">
<a href="/admin/add-flight">Add Flight</a>
<a href="/admin/manage-flights">Manage Flights</a>
<a href="/admin/manage-bookings">Bookings</a>
<a href="/admin/manage-users">Users</a>
</div>

<div class="container">

<div class="card">
<h3>Add New Flight</h3>
<a href="/admin/add-flight"><button>Add Flight</button></a>
</div>

<div class="card">
<h3>Manage Flights</h3>
<a href="/admin/manage-flights"><button>View Flights</button></a>
</div>

<div class="card">
<h3>Manage Bookings</h3>
<a href="/admin/manage-bookings"><button>View Bookings</button></a>
</div>

<div class="card">
<h3>Manage Users</h3>
<a href="/admin/manage-users"><button>View Users</button></a>
</div>

</div>

</body>
</html>
