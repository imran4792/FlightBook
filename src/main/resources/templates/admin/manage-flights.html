<!DOCTYPE html>
<html>
<head>
<title>Manage Flights</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1502920917128-1aa500764ce7");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:900px;
margin:50px auto;
background:white;
padding:30px;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

th, td{
padding:10px;
border-bottom:1px solid #ccc;
text-align:center;
}

th{
background:#004080;
color:white;
}

button{
padding:6px 10px;
background:#0066cc;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h1>Manage Flights</h1>
</div>

<div class="container">

<table>

<tr>
<th>Flight</th>
<th>From</th>
<th>To</th>
<th>Price</th>
<th>Action</th>
</tr>

<tr>
<td>6E202</td>
<td>Hyderabad</td>
<td>Delhi</td>
<td>₹5200</td>
<td><button>Edit</button></td>
</tr>

<tr>
<td>AI440</td>
<td>Mumbai</td>
<td>Chennai</td>
<td>₹6100</td>
<td><button>Edit</button></td>
</tr>

</table>

</div>

</body>
</html>
