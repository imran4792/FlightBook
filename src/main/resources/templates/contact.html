<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1502920917128-1aa500764ce7");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.nav{
background:#004080;
padding:10px;
text-align:center;
}

.nav a{
color:white;
text-decoration:none;
margin:0 15px;
}

.container{
width:500px;
margin:100px auto;
background:white;
padding:30px;
border-radius:6px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:12px;
background:#0066cc;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#004c99;
}

</style>

</head>

<body>

<div class="header">
<h1>Contact Us</h1>
</div>

<div class="nav">
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/search-flights">Flights</a>
</div>

<div class="container">

<h2>Send Message</h2>

<form>

<label>Name</label>
<input type="text">

<label>Email</label>
<input type="email">

<label>Message</label>
<textarea rows="5"></textarea>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
