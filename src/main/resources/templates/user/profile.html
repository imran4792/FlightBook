<!DOCTYPE html>
<html>
<head>
<title>User Profile</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1504198266285-165a0f2a1c7a");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:600px;
margin:80px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

.profile-row{
margin-bottom:15px;
}

label{
font-weight:bold;
}

button{
margin-top:20px;
padding:10px 15px;
background:#0066cc;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#004c99;
}

</style>
</head>

<body>

<div class="header">
<h1>User Profile</h1>
</div>

<div class="container">

<div class="profile-row">
<label>Name:</label> John Doe
</div>

<div class="profile-row">
<label>Email:</label> john@example.com
</div>

<div class="profile-row">
<label>Phone:</label> +91 9876543210
</div>

<div class="profile-row">
<label>Passport:</label> A12345678
</div>

<a href="/edit-profile">
<button>Edit Profile</button>
</a>

</div>

</body>
</html>
