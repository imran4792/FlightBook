<!DOCTYPE html>
<html>
<head>
<title>Ticket Details</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1580674285054-bed31e145f59");
background-size:cover;
background-position:center;
}

.container{
width:600px;
margin:120px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

.details{
line-height:28px;
}

button{
margin-top:20px;
padding:10px 15px;
background:#0066cc;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Flight Ticket</h2>

<div class="details">

<b>Passenger:</b> John Doe<br>
<b>Flight:</b> IndiGo 6E202<br>
<b>From:</b> Hyderabad<br>
<b>To:</b> Delhi<br>
<b>Seat:</b> 2B<br>
<b>Date:</b> 20 July 2026<br>
<b>Status:</b> Confirmed<br>

</div>

<a href="/">
<button>Return Home</button>
</a>

</div>

</body>
</html>
