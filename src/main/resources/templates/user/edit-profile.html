<!DOCTYPE html>
<html>
<head>
<title>Edit Profile</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1529070538774-1843cb3265df");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:500px;
margin:100px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#28a745;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}

</style>
</head>

<body>

<div class="header">
<h1>Edit Profile</h1>
</div>

<div class="container">

<form>

<label>Name</label>
<input type="text" value="John Doe">

<label>Email</label>
<input type="email" value="john@example.com">

<label>Phone</label>
<input type="text" value="+91 9876543210">

<button type="submit">Update Profile</button>

</form>

</div>

</body>
</html>
