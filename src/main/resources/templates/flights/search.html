<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Flights - FlightBook</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style th:replace="fragments/header :: header-styles"></style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .search-container {
            max-width: 800px;
            margin: 120px auto 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .search-header {
            background: linear-gradient(45deg, #1a73e8, #4285f4);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .search-header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .search-header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .search-form {
            padding: 40px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        .swap-button {
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .swap-button:hover {
            background: #1557b0;
            transform: translateY(-50%) scale(1.1);
        }

        .passengers-group {
            grid-column: span 2;
        }

        .search-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .search-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .search-button:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .passengers-group {
                grid-column: span 1;
            }

            .search-container {
                margin: 100px 20px 40px;
            }

            .search-form {
                padding: 30px 20px;
            }

            .header-content {
                padding: 15px 20px;
            }

            .nav {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <div class="search-container">
        <div class="search-header">
            <h1>Search Flights</h1>
            <p>Find the best deals on domestic and international flights</p>
        </div>

        <form class="search-form" action="/flight-results" method="get">
            <div class="form-row">
                <div class="form-group">
                    <label for="source">From</label>
                    <i class="fas fa-plane-departure"></i>
                    <select name="source" id="source" required>
                        <option value="">Select Departure Airport</option>
                        <option th:each="airport : ${airports}"
                                th:value="${airport.iataCode}"
                                th:text="${airport.airportName + ' (' + airport.iataCode + ')'}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="destination">To</label>
                    <i class="fas fa-plane-arrival"></i>
                    <select name="destination" id="destination" required>
                        <option value="">Select Destination Airport</option>
                        <option th:each="airport : ${airports}"
                                th:value="${airport.iataCode}"
                                th:text="${airport.airportName + ' (' + airport.iataCode + ')'}">
                        </option>
                    </select>
                    <button type="button" class="swap-button" onclick="swapLocations()">
                        <i class="fas fa-exchange-alt"></i>
                    </button>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="date">Departure Date</label>
                    <i class="fas fa-calendar-alt"></i>
                    <input type="date" name="date" id="date" required>
                </div>

                <div class="form-group passengers-group">
                    <label for="passengers">Passengers</label>
                    <i class="fas fa-users"></i>
                    <select name="passengers" id="passengers" required>
                        <option value="1">1 Passenger</option>
                        <option value="2">2 Passengers</option>
                        <option value="3">3 Passengers</option>
                        <option value="4">4 Passengers</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="search-button">
                <i class="fas fa-search"></i> Search Flights
            </button>

            <div id="error-message" class="error-message">
                Please select different departure and destination airports.
            </div>
        </form>
    </div>

    <script>
        function swapLocations() {
            const sourceSelect = document.getElementById('source');
            const destSelect = document.getElementById('destination');
            const temp = sourceSelect.value;
            sourceSelect.value = destSelect.value;
            destSelect.value = temp;
        }

        document.querySelector('.search-form').addEventListener('submit', function(e) {
            const source = document.getElementById('source').value;
            const destination = document.getElementById('destination').value;
            const errorDiv = document.getElementById('error-message');

            if (source === destination && source !== '') {
                e.preventDefault();
                errorDiv.style.display = 'block';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            } else {
                errorDiv.style.display = 'none';
            }
        });

        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').setAttribute('min', today);
    </script>
    <script th:replace="fragments/header :: header-script"></script>
</body>
</html>
