<!DOCTYPE html>
<html>
<head>
<title>Search Flights</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-image:url("https://images.unsplash.com/photo-1504198266285-165a0f2a1c7a");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.nav{
text-align:center;
background:#004080;
padding:10px;
}

.nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:16px;
}

.container{
width:500px;
margin:120px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input, select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#0066cc;
border:none;
color:white;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#004c99;
}

</style>
</head>

<body>

<div class="header">
<h1>Flight Booking System</h1>
</div>

<div class="nav">
<a href="/">Home</a>
<a href="/search-flights">Search Flights</a>
<a href="/login">Login</a>
</div>

<div class="container">

<h2>Search Flights</h2>

<form action="/flight-results" method="get">

<label>From</label>
<input type="text" name="source" placeholder="Departure City">

<label>To</label>
<input type="text" name="destination" placeholder="Destination City">

<label>Departure Date</label>
<input type="date" name="date">

<label>Passengers</label>
<select>
<option>1 Passenger</option>
<option>2 Passengers</option>
<option>3 Passengers</option>
<option>4 Passengers</option>
</select>

<button type="submit">Search Flights</button>

</form>

</div>

</body>
</html>
