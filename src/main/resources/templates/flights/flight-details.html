<!DOCTYPE html>
<html>
<head>
<title>Flight Details</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1502920917128-1aa500764ce7");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:700px;
margin:80px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

.details{
line-height:28px;
font-size:16px;
}

button{
width:100%;
margin-top:20px;
padding:12px;
background:#0066cc;
border:none;
color:white;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#004c99;
}

</style>
</head>

<body>

<div class="header">
<h1>Flight Details</h1>
</div>

<div class="container">

<h2>IndiGo Flight 6E202</h2>

<div class="details">

<b>Airline:</b> IndiGo<br>
<b>Flight Number:</b> 6E202<br>
<b>From:</b> Hyderabad<br>
<b>To:</b> Delhi<br>
<b>Departure Time:</b> 10:00 AM<br>
<b>Arrival Time:</b> 12:30 PM<br>
<b>Aircraft:</b> Airbus A320<br>
<b>Cabin Class:</b> Economy<br>
<b>Price:</b> ₹5200<br>

</div>

<a href="/passenger-details">
<button>Continue Booking</button>
</a>

</div>

</body>
</html>
