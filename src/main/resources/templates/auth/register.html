<!DOCTYPE html>
<html>
<head>
<title>User Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1529070538774-1843cb3265df");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:420px;
margin:80px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#28a745;
border:none;
color:white;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}

.links{
text-align:center;
margin-top:15px;
}

a{
text-decoration:none;
color:#0066cc;
}

</style>
</head>

<body>

<div class="header">
<h1>Flight Booking System</h1>
</div>

<div class="container">

<h2>Create Account</h2>

<form action="/register" method="post">

<label>First Name</label>
<input type="text" name="firstName">

<label>Last Name</label>
<input type="text" name="lastName">

<label>Email</label>
<input type="email" name="email">

<label>Password</label>
<input type="password" name="password">

<button type="submit">Register</button>

</form>

<div class="links">
<p>Already registered? <a href="/login">Login</a></p>
</div>

</div>

</body>
</html>
