<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FlightBook</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            margin: 20px;
        }

        .auth-header {
            background: linear-gradient(45deg, #34a853, #81c784);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .auth-header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .auth-header i {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .auth-form {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #34a853;
            box-shadow: 0 0 0 3px rgba(52, 168, 83, 0.1);
            background: white;
        }

        .form-group input::placeholder {
            color: #999;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
            cursor: pointer;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e1e5e9;
            border-radius: 2px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .password-strength-weak {
            background: #ea4335;
            width: 33%;
        }

        .password-strength-medium {
            background: #fbbc04;
            width: 66%;
        }

        .password-strength-strong {
            background: #34a853;
            width: 100%;
        }

        .password-requirements {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .requirement i {
            margin-right: 8px;
            width: 12px;
        }

        .requirement.met i {
            color: #34a853;
        }

        .requirement.unmet i {
            color: #ea4335;
        }

        .submit-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #34a853, #81c784);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 168, 83, 0.3);
            margin-bottom: 20px;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 168, 83, 0.4);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .submit-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
        }

        .auth-links a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .auth-links a:hover {
            color: #1557b0;
            text-decoration: underline;
        }

        .success-message {
            background: #e8f5e8;
            color: #34a853;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #34a853;
        }

        .error-message {
            background: #fce8e6;
            color: #ea4335;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #ea4335;
        }

        @media (max-width: 480px) {
            .auth-container {
                margin: 10px;
                max-width: none;
            }

            .auth-header {
                padding: 30px 20px;
            }

            .auth-header h1 {
                font-size: 24px;
            }

            .auth-form {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <i class="fas fa-lock"></i>
            <h1>Reset Password</h1>
            <p>Create a new secure password</p>
        </div>

        <form class="auth-form" action="/reset-password" method="post">
            <div id="success-message" class="success-message">
                <i class="fas fa-check-circle"></i> Password updated successfully! You can now login with your new password.
            </div>

            <div id="error-message" class="error-message">
                <i class="fas fa-exclamation-triangle"></i> Passwords don't match. Please try again.
            </div>

            <div class="form-group">
                <label for="password">New Password</label>
                <div class="input-icon">
                    <input type="password" id="password" name="password" required placeholder="Enter new password">
                    <i class="fas fa-eye" id="toggle-password"></i>
                </div>
                <div class="password-strength">
                    <div class="password-strength-bar" id="strength-bar"></div>
                </div>
                <div class="password-requirements" id="requirements">
                    <div class="requirement" id="req-length">
                        <i class="fas fa-times"></i> At least 8 characters
                    </div>
                    <div class="requirement" id="req-uppercase">
                        <i class="fas fa-times"></i> One uppercase letter
                    </div>
                    <div class="requirement" id="req-lowercase">
                        <i class="fas fa-times"></i> One lowercase letter
                    </div>
                    <div class="requirement" id="req-number">
                        <i class="fas fa-times"></i> One number
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <div class="input-icon">
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm new password">
                    <i class="fas fa-eye" id="toggle-confirm"></i>
                </div>
            </div>

            <button type="submit" class="submit-button" id="submit-btn" disabled>
                <i class="fas fa-save"></i> Update Password
            </button>

            <div class="auth-links">
                <a href="/login"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </form>
    </div>

    <script>
        // Password visibility toggle
        document.getElementById('toggle-password').addEventListener('click', function() {
            const password = document.getElementById('password');
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        document.getElementById('toggle-confirm').addEventListener('click', function() {
            const confirmPassword = document.getElementById('confirmPassword');
            const type = confirmPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPassword.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Password strength checker
        function checkPasswordStrength(password) {
            const requirements = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /\d/.test(password)
            };

            // Update requirement indicators
            document.getElementById('req-length').className = requirements.length ? 'requirement met' : 'requirement unmet';
            document.getElementById('req-uppercase').className = requirements.uppercase ? 'requirement met' : 'requirement unmet';
            document.getElementById('req-lowercase').className = requirements.lowercase ? 'requirement met' : 'requirement unmet';
            document.getElementById('req-number').className = requirements.number ? 'requirement met' : 'requirement unmet';

            // Update icons
            document.querySelectorAll('.requirement i').forEach(icon => {
                const isMet = icon.parentElement.classList.contains('met');
                icon.className = isMet ? 'fas fa-check' : 'fas fa-times';
            });

            // Calculate strength
            const metRequirements = Object.values(requirements).filter(Boolean).length;
            const strengthBar = document.getElementById('strength-bar');

            strengthBar.className = 'password-strength-bar';
            if (metRequirements <= 1) {
                strengthBar.classList.add('password-strength-weak');
            } else if (metRequirements <= 3) {
                strengthBar.classList.add('password-strength-medium');
            } else {
                strengthBar.classList.add('password-strength-strong');
            }

            return metRequirements === 4;
        }

        // Form validation
        document.getElementById('password').addEventListener('input', function() {
            const isStrong = checkPasswordStrength(this.value);
            const confirmPassword = document.getElementById('confirmPassword');
            const submitBtn = document.getElementById('submit-btn');

            if (isStrong && confirmPassword.value && this.value === confirmPassword.value) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        });

        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password');
            const submitBtn = document.getElementById('submit-btn');
            const errorDiv = document.getElementById('error-message');

            if (this.value && password.value !== this.value) {
                errorDiv.textContent = 'Passwords don\'t match.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = true;
            } else {
                errorDiv.style.display = 'none';
                if (checkPasswordStrength(password.value)) {
                    submitBtn.disabled = false;
                }
            }
        });

        // Form submission
        document.querySelector('.auth-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords don\'t match.';
                errorDiv.style.display = 'block';
                return;
            }

            if (!checkPasswordStrength(password)) {
                errorDiv.textContent = 'Password does not meet requirements.';
                errorDiv.style.display = 'block';
                return;
            }

            // Simulate successful submission
            successDiv.style.display = 'block';

            // Redirect to login after success
            setTimeout(() => {
                window.location.href = '/login';
            }, 3000);
        });
    </script>
</body>
</html>
