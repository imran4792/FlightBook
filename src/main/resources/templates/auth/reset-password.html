<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1494412651409-8963ce7935a7");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:380px;
margin:120px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#0066cc;
border:none;
color:white;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#004c99;
}

</style>
</head>

<body>

<div class="header">
<h1>Flight Booking System</h1>
</div>

<div class="container">

<h2>Reset Password</h2>

<form action="/reset-password" method="post">

<label>New Password</label>
<input type="password" name="password">

<label>Confirm Password</label>
<input type="password" name="confirmPassword">

<button type="submit">Update Password</button>

</form>

</div>

</body>
</html>
