<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1517479149777-5f3b1511d5ad");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:360px;
margin:150px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#ff9800;
border:none;
color:white;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#cc7a00;
}

.links{
text-align:center;
margin-top:15px;
}

</style>
</head>

<body>

<div class="header">
<h1>Flight Booking System</h1>
</div>

<div class="container">

<h2>Forgot Password</h2>

<form action="/forgot-password" method="post">

<label>Enter your email</label>
<input type="email" name="email">

<button type="submit">Send Reset Link</button>

</form>

<div class="links">
<a href="/login">Back to Login</a>
</div>

</div>

</body>
</html>
