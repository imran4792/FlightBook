<!DOCTYPE html>
<html>
<head>
<title>Passenger Details</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1529070538774-1843cb3265df");
background-size:cover;
background-position:center;
}

.header{
background:#003366;
color:white;
padding:15px;
text-align:center;
}

.container{
width:600px;
margin:80px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:12px;
background:#0066cc;
border:none;
color:white;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#004c99;
}

</style>
</head>

<body>

<div class="header">
<h1>Passenger Details</h1>
</div>

<div class="container">

<h2>Enter Passenger Information</h2>

<form action="/seat-selection">

<label>Full Name</label>
<input type="text" name="name">

<label>Age</label>
<input type="number" name="age">

<label>Passport Number</label>
<input type="text" name="passport">

<label>Email</label>
<input type="email" name="email">

<button type="submit">Continue</button>

</form>

</div>

</body>
</html>
