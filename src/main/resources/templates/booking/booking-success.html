<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful - FlightBook</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style th:replace="fragments/header :: header-styles"></style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Main Content */
        main {
            padding-top: 80px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 40px;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 30px 40px;
        }

        .success-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 600px;
            width: 100%;
            position: relative;
        }

        .success-header {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            padding: 50px 30px;
            text-align: center;
            position: relative;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            animation: checkmark 0.8s ease-in-out;
        }

        .success-icon i {
            font-size: 40px;
            color: #28a745;
        }

        @keyframes checkmark {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .success-header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .success-content {
            padding: 40px 30px;
        }

        .booking-details {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .booking-id {
            text-align: center;
            margin-bottom: 20px;
        }

        .booking-id-label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .booking-id-value {
            font-size: 24px;
            font-weight: 700;
            color: #1a73e8;
            letter-spacing: 2px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
            font-weight: 500;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
        }

        .email-notice {
            background: linear-gradient(45deg, #e3f2fd, #f3e5f5);
            border: 1px solid #1a73e8;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .email-notice i {
            color: #1a73e8;
            font-size: 24px;
        }

        .email-notice-content h3 {
            color: #1a73e8;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .email-notice-content p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #1a73e8, #4285f4);
            color: white;
            box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 115, 232, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover {
            border-color: #1a73e8;
            color: #1a73e8;
            transform: translateY(-2px);
        }

        .confetti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd700;
            animation: fall 3s linear infinite;
        }

        .confetti-piece:nth-child(2n) {
            background: #ff6b35;
        }

        .confetti-piece:nth-child(3n) {
            background: #1a73e8;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .action-buttons {
                grid-template-columns: 1fr;
            }

            .success-content {
                padding: 30px 20px;
            }

            .main-content {
                padding: 100px 20px 40px;
            }
        }
    </style>
</head>
<body>
    <header th:replace="fragments/header :: header"></header>

    <main>
    <div class="main-content">
        <div class="success-container">
            <div class="success-header">
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <h1>Booking Successful!</h1>
                <p>Your flight ticket has been booked successfully</p>
            </div>

            <div class="success-content">
                <div class="booking-details">
                    <div class="booking-id">
                        <div class="booking-id-label">Booking ID</div>
                        <div class="booking-id-value" id="booking-id" th:text="${bookingReference ?: 'FB-' + T(java.util.UUID).randomUUID().toString().substring(0, 8).toUpperCase()}"></div>
                    </div>

                    <div class="detail-row">
                        <span class="detail-label">Flight</span>
                        <span class="detail-value" id="flight-route" th:text="${flightNumber != null && route != null ? flightNumber + ' – ' + route : 'Flight details not available'}"></span>
                    </div>

                    <div class="detail-row">
                        <span class="detail-label">Date</span>
                        <span class="detail-value" id="journey-date" th:text="${bookingDate != null ? bookingDate : 'Date not available'}"></span>
                    </div>

                    <div class="detail-row">
                        <span class="detail-label">Passenger</span>
                        <span class="detail-value" id="passenger-count" th:text="${passengerName != null ? passengerName + ' (' + age + ' yrs)' : 'Passenger details not available'}"></span>
                    </div>

                    <div class="detail-row">
                        <span class="detail-label">Total Amount</span>
                        <span class="detail-value" id="total-amount" th:text="${totalPrice != null ? '₹' + #numbers.formatDecimal(totalPrice, 0, 'COMMA', 2, 'POINT') : 'Amount not available'}"></span>
                    </div>
                </div>

                <div class="email-notice">
                    <i class="fas fa-envelope"></i>
                    <div class="email-notice-content">
                        <h3>Email Confirmation Sent</h3>
                        <p>A confirmation email with your ticket details has been sent to your registered email address.</p>
                    </div>
                </div>

                <div class="action-buttons">
                    <a href="/download-ticket" class="btn btn-primary">
                        <i class="fas fa-download"></i> Download Ticket
                    </a>
                    <a href="/user/dashboard" class="btn btn-secondary">
                        <i class="fas fa-tachometer-alt"></i> My Bookings
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Create confetti effect
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';

            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.animationDelay = Math.random() * 3 + 's';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.appendChild(piece);
            }

            document.body.appendChild(confetti);

            // Remove confetti after animation
            setTimeout(() => {
                confetti.remove();
            }, 5000);
        }

        // Initialize page
        window.addEventListener('load', function() {
            createConfetti();

            // Clear booking data from localStorage after displaying
            setTimeout(() => {
                localStorage.removeItem('passengerDetails');
                localStorage.removeItem('selectedSeats');
                localStorage.removeItem('bookingSummary');
            }, 1000);
        });
    </script>
    <script th:replace="fragments/header :: header-script"></script>
    </main>
</body>
</html>
